<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <radialGradient id="ringGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="70%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#e74c3c" stop-opacity="0.15"/>
    </radialGradient>
    <linearGradient id="redBall" x1="0.2" y1="0.1" x2="0.8" y2="0.9">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <linearGradient id="blueBall" x1="0.2" y1="0.1" x2="0.8" y2="0.9">
      <stop offset="0%" stop-color="#74b9ff"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#e74c3c" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Círculo del ring (dohyo) -->
  <circle cx="256" cy="230" r="140" fill="none" stroke="#2d2d4e" stroke-width="3"/>
  <circle cx="256" cy="230" r="120" fill="url(#ringGlow)" stroke="#3d3d5e" stroke-width="2"/>
  <circle cx="256" cy="230" r="100" fill="none" stroke="#2d2d4e" stroke-width="1" stroke-dasharray="6,6" opacity="0.5"/>

  <!-- Líneas del ring (círculo concéntrico interior) -->
  <circle cx="256" cy="230" r="50" fill="none" stroke="#3d3d5e" stroke-width="1" opacity="0.3"/>

  <!-- Luchador 1 (bola roja, izquierda) -->
  <g filter="url(#shadow)">
    <circle cx="200" cy="200" r="40" fill="url(#redBall)"/>
    <!-- Ojos -->
    <circle cx="188" cy="192" r="6" fill="white"/>
    <circle cx="212" cy="192" r="6" fill="white"/>
    <circle cx="190" cy="193" r="3" fill="#2d3436"/>
    <circle cx="214" cy="193" r="3" fill="#2d3436"/>
    <!-- Ceño fruncido -->
    <line x1="186" y1="180" x2="195" y2="184" stroke="#2d3436" stroke-width="2" stroke-linecap="round"/>
    <line x1="214" y1="180" x2="205" y2="184" stroke="#2d3436" stroke-width="2" stroke-linecap="round"/>
    <!-- Sonrisa -->
    <path d="M190 208 Q200 216 210 208" fill="none" stroke="#2d3436" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Brazos -->
    <line x1="165" y1="210" x2="140" y2="190" stroke="#c0392b" stroke-width="8" stroke-linecap="round"/>
    <line x1="235" y1="210" x2="260" y2="190" stroke="#c0392b" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Luchador 2 (bola azul, derecha) -->
  <g filter="url(#shadow)">
    <circle cx="312" cy="200" r="40" fill="url(#blueBall)"/>
    <!-- Ojos -->
    <circle cx="300" cy="192" r="6" fill="white"/>
    <circle cx="324" cy="192" r="6" fill="white"/>
    <circle cx="302" cy="193" r="3" fill="#2d3436"/>
    <circle cx="326" cy="193" r="3" fill="#2d3436"/>
    <!-- Ceño fruncido -->
    <line x1="298" y1="180" x2="307" y2="184" stroke="#2d3436" stroke-width="2" stroke-linecap="round"/>
    <line x1="326" y1="180" x2="317" y2="184" stroke="#2d3436" stroke-width="2" stroke-linecap="round"/>
    <!-- Sonrisa -->
    <path d="M302 208 Q312 216 322 208" fill="none" stroke="#2d3436" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Brazos -->
    <line x1="277" y1="210" x2="252" y2="190" stroke="#2980b9" stroke-width="8" stroke-linecap="round"/>
    <line x1="347" y1="210" x2="372" y2="190" stroke="#2980b9" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Impacto/chispas entre ellos -->
  <g opacity="0.8">
    <line x1="252" y1="190" x2="248" y2="180" stroke="#f1c40f" stroke-width="2" stroke-linecap="round"/>
    <line x1="260" y1="195" x2="268" y2="185" stroke="#f1c40f" stroke-width="2" stroke-linecap="round"/>
    <line x1="255" y1="205" x2="245" y2="210" stroke="#f39c12" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="256" cy="198" r="4" fill="#f1c40f" opacity="0.6"/>
  </g>

  <!-- Icono de torneo/copa arriba -->
  <g transform="translate(256, 60)">
    <path d="M-15 0 L-20 -30 Q-25 -40 -15 -45 Q-5 -50 0 -35 Q5 -50 15 -45 Q25 -40 20 -30 L15 0 Z" fill="#fbbf24" opacity="0.8"/>
    <rect x="-6" y="0" width="12" height="6" fill="#fbbf24" opacity="0.6"/>
    <rect x="-3" y="6" width="6" height="10" fill="#fbbf24" opacity="0.4"/>
  </g>

  <!-- Texto inferior -->
  <text x="256" y="420" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="800" fill="#f1f5f9" text-anchor="middle" letter-spacing="3">SUMO BALLS</text>
  <text x="256" y="448" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="500" fill="#64748b" text-anchor="middle" letter-spacing="6">ARENA</text>

  <!-- Línea decorativa -->
  <line x1="160" y1="468" x2="352" y2="468" stroke="#2d2d4e" stroke-width="1.5"/>
</svg>
