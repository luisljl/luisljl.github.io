<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 170">
  <defs>
    <!-- COSMO gold gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fff5a0"/>
      <stop offset="35%"  stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#a06800"/>
    </linearGradient>
    <!-- PLAYERS blue gradient -->
    <linearGradient id="blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#a8d8ff"/>
      <stop offset="100%" stop-color="#3a80cc"/>
    </linearGradient>
    <!-- Planet warm gradient -->
    <radialGradient id="planet" cx="33%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#fff5b0"/>
      <stop offset="45%"  stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#7a4d00"/>
    </radialGradient>
    <!-- Planet halo -->
    <radialGradient id="phalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffd700" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <!-- Text glow -->
    <filter id="tglow" x="-15%" y="-40%" width="130%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Planet glow -->
    <filter id="pglow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Stars background -->
  <circle cx="15"  cy="12"  r="1.4" fill="white" opacity="0.80"/>
  <circle cx="38"  cy="5"   r="1.0" fill="white" opacity="0.60"/>
  <circle cx="75"  cy="18"  r="1.2" fill="white" opacity="0.70"/>
  <circle cx="150" cy="8"   r="0.9" fill="white" opacity="0.55"/>
  <circle cx="210" cy="3"   r="1.3" fill="white" opacity="0.75"/>
  <circle cx="255" cy="14"  r="1.0" fill="white" opacity="0.60"/>
  <circle cx="190" cy="155" r="1.1" fill="white" opacity="0.55"/>
  <circle cx="55"  cy="148" r="1.0" fill="white" opacity="0.60"/>
  <circle cx="100" cy="162" r="0.8" fill="white" opacity="0.45"/>
  <circle cx="130" cy="8"   r="0.8" fill="white" opacity="0.50"/>

  <!-- ═══ Planet (right side) ═══ -->
  <g transform="translate(358 88)">
    <!-- Halo -->
    <circle r="52" fill="url(#phalo)"/>
    <!-- Ring — back half -->
    <ellipse rx="58" ry="17" fill="none"
      stroke="#6844b0" stroke-width="6" opacity="0.50"
      transform="rotate(-20)"/>
    <!-- Planet body -->
    <circle r="30" fill="url(#planet)" filter="url(#pglow)"/>
    <!-- Atmospheric bands -->
    <ellipse rx="24" ry="5"  ry="4.5" fill="#b87800" opacity="0.22" transform="translate(0,-7) rotate(-6)"/>
    <ellipse rx="26" ry="5"         fill="#b87800" opacity="0.18" transform="translate(0, 5)"/>
    <!-- Ring — front arc -->
    <path d="M -58 0 Q 0 -14 58 0"
      fill="none" stroke="#c0a0ff" stroke-width="6" opacity="0.90"
      stroke-linecap="round"/>
    <!-- Specular highlight -->
    <ellipse rx="10" ry="7" fill="white" opacity="0.22"
      transform="translate(-9,-11) rotate(-25)"/>
  </g>

  <!-- ═══ "COSMO" main title ═══ -->
  <text
    x="195" y="90"
    font-family="'Arial Black', 'Impact', 'Franklin Gothic Heavy', sans-serif"
    font-size="76" font-weight="900"
    fill="url(#gold)"
    text-anchor="middle"
    letter-spacing="5"
    stroke="#6b3d00" stroke-width="2" paint-order="stroke"
    filter="url(#tglow)"
  >COSMO</text>

  <!-- ═══ "PLAYERS" subtitle ═══ -->
  <text
    x="195" y="132"
    font-family="'Arial Black', 'Impact', 'Franklin Gothic Heavy', sans-serif"
    font-size="36" font-weight="700"
    fill="url(#blue)"
    text-anchor="middle"
    letter-spacing="14"
    stroke="#072050" stroke-width="1.5" paint-order="stroke"
  >PLAYERS</text>

  <!-- Decorative separator line -->
  <line x1="42" y1="99" x2="310" y2="99"
    stroke="#4b90d5" stroke-width="1" opacity="0.28"/>
</svg>
