<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="ball" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#0088ff"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00ff"/>
      <stop offset="100%" style="stop-color:#ff6600"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00ccff"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffff00"/>
      <stop offset="100%" style="stop-color:#ff8800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#bg)"/>
  <!-- Bars with gaps -->
  <rect x="10" y="50" width="60" height="8" rx="4" fill="url(#bar1)" filter="url(#glow)"/>
  <rect x="100" y="50" width="90" height="8" rx="4" fill="url(#bar1)" filter="url(#glow)"/>
  <rect x="10" y="100" width="120" height="8" rx="4" fill="url(#bar2)" filter="url(#glow)"/>
  <rect x="150" y="100" width="40" height="8" rx="4" fill="url(#bar2)" filter="url(#glow)"/>
  <rect x="10" y="150" width="40" height="8" rx="4" fill="url(#bar3)" filter="url(#glow)"/>
  <rect x="80" y="150" width="110" height="8" rx="4" fill="url(#bar3)" filter="url(#glow)"/>
  <!-- Ball (dropping through gap in middle bar) -->
  <circle cx="140" cy="78" r="16" fill="url(#ball)" filter="url(#glow)"/>
  <circle cx="134" cy="73" r="5" fill="white" opacity="0.6"/>
  <!-- Trail lines -->
  <line x1="140" y1="30" x2="140" y2="55" stroke="#00ffff" stroke-width="2" opacity="0.4" stroke-dasharray="4,4"/>
</svg>
