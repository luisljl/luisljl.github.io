<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0b1120"/>
    </linearGradient>
    <linearGradient id="ball" x1="0.2" y1="0.1" x2="0.8" y2="0.9">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Círculos decorativos -->
  <circle cx="130" cy="90" r="24" fill="url(#ball)" filter="url(#shadow)" opacity="0.15"/>
  <circle cx="390" cy="130" r="20" fill="url(#ball)" filter="url(#shadow)" opacity="0.12"/>

  <!-- Cartón de bingo -->
  <rect x="128" y="70" width="256" height="240" rx="20" fill="#0f172a" stroke="#1e293b" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- Líneas del cartón -->
  <line x1="128" y1="130" x2="384" y2="130" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="128" y1="190" x2="384" y2="190" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="128" y1="250" x2="384" y2="250" stroke="#1e293b" stroke-width="1.5"/>
  
  <line x1="213" y1="70" x2="213" y2="310" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="298" y1="70" x2="298" y2="310" stroke="#1e293b" stroke-width="1.5"/>

  <!-- B I N G O header -->
  <text x="170" y="108" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="800" fill="#fbbf24" text-anchor="middle" letter-spacing="2">B</text>
  <text x="256" y="108" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="800" fill="#fbbf24" text-anchor="middle" letter-spacing="2">I</text>
  <text x="340" y="108" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="800" fill="#fbbf24" text-anchor="middle" letter-spacing="2">N</text>

  <!-- Fila 1 -->
  <text x="170" y="172" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#f1f5f9" text-anchor="middle">1</text>
  <circle cx="256" cy="160" r="16" fill="url(#blue)"/>
  <text x="256" y="166" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">17</text>
  <text x="340" y="172" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#f1f5f9" text-anchor="middle">45</text>

  <!-- Fila 2 -->
  <circle cx="170" cy="220" r="16" fill="url(#blue)"/>
  <text x="170" y="226" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">5</text>
  <text x="256" y="232" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#f1f5f9" text-anchor="middle">22</text>
  <circle cx="340" cy="220" r="16" fill="url(#blue)"/>
  <text x="340" y="226" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">38</text>

  <!-- Fila 3 -->
  <text x="170" y="292" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#f1f5f9" text-anchor="middle">9</text>
  <circle cx="256" cy="280" r="16" fill="url(#blue)"/>
  <text x="256" y="286" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">31</text>
  <text x="340" y="292" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#f1f5f9" text-anchor="middle">52</text>

  <!-- Fila 4 -->
  <circle cx="170" cy="340" r="16" fill="url(#blue)"/>
  <text x="170" y="346" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">14</text>
  <text x="256" y="352" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#f1f5f9" text-anchor="middle">67</text>
  <circle cx="340" cy="340" r="16" fill="url(#blue)"/>
  <text x="340" y="346" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">83</text>

  <!-- Bola actual grande -->
  <circle cx="256" cy="400" r="44" fill="url(#ball)" filter="url(#shadow)"/>
  <text x="256" y="410" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a" text-anchor="middle">69</text>

  <!-- Texto inferior -->
  <text x="256" y="478" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="600" fill="#64748b" text-anchor="middle" letter-spacing="5">BINGO JL</text>
</svg>
